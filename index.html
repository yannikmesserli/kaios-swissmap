<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=240, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SwissMap</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="map"></div>
  <div id="crosshair"></div>

  <div id="search-overlay">
    <input id="search-input" type="text" placeholder="Search location..." nav-selectable="true">
    <ul id="search-results"></ul>
  </div>

  <div id="softkeys">
    <span id="sk-left">Search</span>
    <span id="sk-center"></span>
    <span id="sk-right"></span>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
